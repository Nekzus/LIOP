<svg viewBox="0 0 1000 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animation Paths -->
    <path id="path-req-mcp" d="M 220 160 L 400 160" fill="none" />
    <path id="path-res-mcp" d="M 400 280 L 220 280" fill="none" />
    
    <path id="path-req-liop" d="M 620 160 L 800 160" fill="none" />
    <path id="path-res-liop" d="M 800 280 L 620 280" fill="none" />
  </defs>

  <style>
    .text-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #e2e8f0;
    }
    .text-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
    }
    .text-tiny {
      font-family: monospace;
      font-size: 12px;
      fill: #fbbf24;
    }
    .conn-line {
      stroke: #334155;
      stroke-width: 2;
      stroke-dasharray: 6, 6;
      animation: dash 20s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -400; }
    }

    /* Claude -> Sentinel */
    @keyframes moveReqMcp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(180px); opacity: 0; }
    }
    .req-mcp-0 { animation: moveReqMcp 1.5s linear infinite; opacity: 0; }
    .req-mcp-1 { animation: moveReqMcp 1.5s linear infinite -0.5s; opacity: 0; }
    .req-mcp-2 { animation: moveReqMcp 1.5s linear infinite -1.0s; opacity: 0; }

    /* Sentinel -> Vault */
    @keyframes moveReqNmp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(180px); opacity: 0; }
    }
    .req-nmp-0 { animation: moveReqNmp 1.5s linear infinite; opacity: 0; }
    .req-nmp-1 { animation: moveReqNmp 1.5s linear infinite -0.5s; opacity: 0; }
    .req-nmp-2 { animation: moveReqNmp 1.5s linear infinite -1.0s; opacity: 0; }

    /* Vault -> Sentinel */
    @keyframes moveResNmp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-180px); opacity: 0; }
    }
    .res-nmp-0 { animation: moveResNmp 1.5s linear infinite; opacity: 0; }
    .res-nmp-1 { animation: moveResNmp 1.5s linear infinite -0.5s; opacity: 0; }
    .res-nmp-2 { animation: moveResNmp 1.5s linear infinite -1.0s; opacity: 0; }

    /* Sentinel -> Claude */
    @keyframes moveResMcp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-180px); opacity: 0; }
    }
    .res-mcp-0 { animation: moveResMcp 1.5s linear infinite; opacity: 0; }
    .res-mcp-1 { animation: moveResMcp 1.5s linear infinite -0.5s; opacity: 0; }
    .res-mcp-2 { animation: moveResMcp 1.5s linear infinite -1.0s; opacity: 0; }

    /* WASI Processing */
    @keyframes rotateProc {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .proc-0 { animation: rotateProc 1.5s linear infinite; }
    .proc-1 { animation: rotateProc 1.5s linear infinite -0.5s; }
    .proc-2 { animation: rotateProc 1.5s linear infinite -1s; }
  </style>

  <!-- Background Lines -->
  <!-- Left -->
  <line x1="220" y1="160" x2="400" y2="160" class="conn-line" />
  <line x1="400" y1="280" x2="220" y2="280" class="conn-line" />
  <!-- Right -->
  <line x1="620" y1="160" x2="800" y2="160" class="conn-line" />
  <line x1="800" y1="280" x2="620" y2="280" class="conn-line" />

  <!-- Labels -->
  <text x="310" y="145" class="text-sub" text-anchor="middle">HTTP JSON-RPC</text>
  <text x="310" y="305" class="text-sub" text-anchor="middle" fill="#facc15">MCP Text Result</text>
  
  <text x="710" y="145" class="text-sub" text-anchor="middle">gRPC PQC + AES</text>
  <text x="710" y="305" class="text-sub" text-anchor="middle" fill="#a78bfa">ZK-Receipts / Proofs</text>

  <!-- Node 1: Claude (Client) -->
  <rect x="20" y="100" width="200" height="240" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
  <text x="120" y="140" class="text-title" text-anchor="middle">Claude Desktop</text>
  <text x="120" y="165" class="text-sub" text-anchor="middle">MCP Client</text>
  
  <rect x="40" y="200" width="160" height="120" rx="6" fill="#1e293b" />
  <text x="120" y="225" class="text-sub" text-anchor="middle">1. Build Request</text>
  <text x="120" y="255" class="text-sub" text-anchor="middle">2. Send JSON</text>
  <text x="120" y="285" class="text-sub" text-anchor="middle">3. Display Data</text>

  <!-- Node 2: The Sentinel -->
  <rect x="400" y="100" width="220" height="240" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" />
  <text x="510" y="140" class="text-title" text-anchor="middle">The Sentinel</text>
  <text x="510" y="165" class="text-sub" text-anchor="middle">Hybrid Gateway</text>

  <rect x="420" y="180" width="180" height="140" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1" />
  <text x="510" y="205" class="text-tiny" text-anchor="middle">JSON » gRPC ROUTER</text>
  <text x="510" y="235" class="text-sub" text-anchor="middle" fill="#bae6fd">1. DHT Discovery</text>
  <text x="510" y="265" class="text-sub" text-anchor="middle" fill="#bae6fd">2. Key Exchange</text>
  <text x="510" y="295" class="text-sub" text-anchor="middle" fill="#bae6fd">3. Transcode ⇆</text>

  <!-- Node 3: The Vault -->
  <rect x="800" y="100" width="180" height="240" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" />
  <text x="890" y="140" class="text-title" text-anchor="middle">The Vault</text>
  <text x="890" y="165" class="text-sub" text-anchor="middle">Zero-Trust Node</text>

  <rect x="810" y="180" width="160" height="140" rx="8" fill="#450a0a" stroke="#f43f5e" stroke-width="2" />
  <text x="890" y="205" class="text-tiny" text-anchor="middle">WASI SANDBOX</text>
  <text x="890" y="240" class="text-sub" text-anchor="middle" fill="#fecdd3">1. Guardian AST</text>
  <text x="890" y="270" class="text-sub" text-anchor="middle" fill="#fecdd3">2. Blind Compute</text>
  <text x="890" y="300" class="text-sub" text-anchor="middle" fill="#fecdd3">3. Gen ZK Proof</text>

  <!-- Particles -->
  <!-- Claude -> Sentinel (Yellow) -->
  <circle cx="220" cy="160" r="6" fill="#facc15" class="req-mcp-0" />
  <circle cx="220" cy="160" r="6" fill="#facc15" class="req-mcp-1" />
  <circle cx="220" cy="160" r="6" fill="#facc15" class="req-mcp-2" />

  <!-- Sentinel -> Vault (Blue) -->
  <circle cx="620" cy="160" r="6" fill="#38bdf8" class="req-nmp-0" />
  <circle cx="620" cy="160" r="6" fill="#38bdf8" class="req-nmp-1" />
  <circle cx="620" cy="160" r="6" fill="#38bdf8" class="req-nmp-2" />

  <!-- Vault -> Sentinel (Purple ZK) -->
  <circle cx="800" cy="280" r="6" fill="#a78bfa" class="res-nmp-0" />
  <circle cx="800" cy="280" r="6" fill="#a78bfa" class="res-nmp-1" />
  <circle cx="800" cy="280" r="6" fill="#a78bfa" class="res-nmp-2" />

  <!-- Sentinel -> Claude (Yellow Result) -->
  <circle cx="400" cy="280" r="6" fill="#facc15" class="res-mcp-0" />
  <circle cx="400" cy="280" r="6" fill="#facc15" class="res-mcp-1" />
  <circle cx="400" cy="280" r="6" fill="#facc15" class="res-mcp-2" />

  <!-- Processing in Vault (Rose) -->
  <g transform="translate(890, 240)">
    <circle cx="0" cy="-45" r="4" fill="#fbbf24" class="proc-0" />
    <circle cx="0" cy="-45" r="4" fill="#fbbf24" class="proc-1" />
    <circle cx="0" cy="-45" r="4" fill="#fbbf24" class="proc-2" />
  </g>
</svg>
