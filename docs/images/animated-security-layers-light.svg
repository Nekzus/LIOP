<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="260" fill="#FAFAFA" rx="16" />
    <style>
        .sl-text { font-family: 'Inter', system-ui, sans-serif; fill: #09090b; font-size: 13px; font-weight: 600; }
        .sl-sub { font-family: 'Inter', system-ui, sans-serif; fill: #71717A; font-size: 11px; }
        .sl-box { fill: #FFFFFF; stroke: #D4D4D8; stroke-width: 2; rx: 8; }
        .sl-line { stroke: #A1A1AA; stroke-width: 2; fill: none; stroke-linecap: round; }
        
        /* Premium Data Stream (Marching Ants) */
        .sl-stream {
            stroke: #3B82F6;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 6 6;
            stroke-linecap: round;
        }
        
        .sl-packet { fill: #3B82F6; }
        .sl-icon-active { fill: none; stroke: #3B82F6; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

        @keyframes pulseBorder {
            0% { stroke: #D4D4D8; }
            50% { stroke: #3B82F6; filter: drop-shadow(0 0 6px rgba(59,130,246,0.3)); }
            100% { stroke: #D4D4D8; }
        }
        
        @keyframes streamFlow {
            from { stroke-dashoffset: 12; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes movePacket {
            0% { transform: translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(40px); opacity: 0; }
        }

        .anim-box-1 { animation: pulseBorder 4s infinite 0s; }
        .anim-box-2 { animation: pulseBorder 4s infinite 1s; }
        .anim-box-3 { animation: pulseBorder 4s infinite 2s; }
        .anim-box-4 { animation: pulseBorder 4s infinite 3s; }
        
        .anim-stream { animation: streamFlow 0.5s linear infinite; }
        
        .anim-packet-1 { animation: movePacket 2s infinite 0s; }
        .anim-packet-2 { animation: movePacket 2s infinite 0.6s; }
        .anim-packet-3 { animation: movePacket 2s infinite 1.2s; }
    </style>
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Connectors -->
    <path d="M 180 130 L 230 130" class="sl-line" />
    <path d="M 380 130 L 430 130" class="sl-line" />
    <path d="M 580 130 L 630 130" class="sl-line" />

    <!-- Animated Stream Connectors -->
    <path d="M 180 130 L 230 130" class="sl-stream anim-stream" filter="url(#glow)" />
    <path d="M 380 130 L 430 130" class="sl-stream anim-stream" filter="url(#glow)" />
    <path d="M 580 130 L 630 130" class="sl-stream anim-stream" filter="url(#glow)" />

    <!-- Layers -->
    <g transform="translate(40, 85)">
        <rect width="140" height="90" class="sl-box anim-box-1" />
        <!-- Shield Icon -->
        <g transform="translate(58, 15)">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" class="sl-icon-active" filter="url(#glow)" />
        </g>
        <text x="70" y="60" text-anchor="middle" class="sl-text">① Guardian AST</text>
        <text x="70" y="75" text-anchor="middle" class="sl-sub">Static Analysis</text>
    </g>

    <g transform="translate(240, 85)">
        <rect width="140" height="90" class="sl-box anim-box-2" />
        <!-- Lock Icon -->
        <g transform="translate(58, 15)">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" class="sl-icon-active" filter="url(#glow)" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" class="sl-icon-active" filter="url(#glow)" />
        </g>
        <text x="70" y="60" text-anchor="middle" class="sl-text">② WASI Sandbox</text>
        <text x="70" y="75" text-anchor="middle" class="sl-sub">Runtime Isolation</text>
    </g>

    <g transform="translate(440, 85)">
        <rect width="140" height="90" class="sl-box anim-box-3" />
        <!-- Eye Off Icon -->
        <g transform="translate(58, 15)">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22" class="sl-icon-active" filter="url(#glow)" />
        </g>
        <text x="70" y="60" text-anchor="middle" class="sl-text">③ PII Shield</text>
        <text x="70" y="75" text-anchor="middle" class="sl-sub">Egress Filtering</text>
    </g>

    <g transform="translate(640, 85)">
        <rect width="140" height="90" class="sl-box anim-box-4" />
        <!-- File Check Icon -->
        <g transform="translate(58, 15)">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" class="sl-icon-active" filter="url(#glow)" />
            <path d="M14 2v6h6" class="sl-icon-active" filter="url(#glow)" />
            <path d="m9 15 2 2 4-4" class="sl-icon-active" filter="url(#glow)" />
        </g>
        <text x="70" y="60" text-anchor="middle" class="sl-text">④ ZK-Receipt</text>
        <text x="70" y="75" text-anchor="middle" class="sl-sub">Crypto Integrity</text>
    </g>

    <!-- Animated Data Packets (Secondary) -->
    <g transform="translate(185, 130)">
        <g class="anim-packet-1">
            <circle cx="0" cy="0" r="3" class="sl-packet" filter="url(#glow)" />
        </g>
    </g>
    
    <g transform="translate(385, 130)">
        <g class="anim-packet-2">
            <circle cx="0" cy="0" r="3" class="sl-packet" filter="url(#glow)" />
        </g>
    </g>

    <g transform="translate(585, 130)">
        <g class="anim-packet-3">
            <circle cx="0" cy="0" r="3" class="sl-packet" filter="url(#glow)" />
        </g>
    </g>
</svg>
