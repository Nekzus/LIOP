<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Base Background -->
    <rect width="900" height="400" fill="#fafafa" rx="16" />
    
    <defs>
        <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
        </radialGradient>
    </defs>

    <style>
        .title { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #09090b; }
        .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #71717a; }
        .phase-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #3b82f6; letter-spacing: 2px; }
        .io-label { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #71717a; letter-spacing: 1px; }
        
        .icon-blue { fill: none; stroke: #3b82f6; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .icon-purple { fill: none; stroke: #8b5cf6; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @keyframes streamPulse {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }
        
        .anim-track {
            stroke: #3b82f6;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 0 24;
            animation: streamPulse 0.6s linear infinite;
            filter: drop-shadow(0 0 4px rgba(59,130,246,0.4));
        }
    </style>

    <!-- Base Track -->
    <path d="M 0 120 L 830 120 A 20 20 0 0 1 850 140 L 850 260 A 20 20 0 0 1 830 280 L 0 280" fill="none" stroke="#e4e4e7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Animated Track -->
    <path d="M 0 120 L 830 120 A 20 20 0 0 1 850 140 L 850 260 A 20 20 0 0 1 830 280 L 0 280" fill="none" class="anim-track" stroke-linejoin="round" />

    <!-- Labels Phase -->
    <text x="95" y="45" class="phase-label">PHASE 1: EXECUTION &amp; SANDBOX</text>
    <text x="595" y="205" class="phase-label">PHASE 2: EGRESS &amp; CRYPTO</text>

    <!-- ROW 1 (Left to Right) -->
    
    <!-- Box 1: Guardian AST -->
    <g transform="translate(95, 75)">
        <circle cx="105" cy="45" r="70" fill="url(#glowBlue)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowBlue)" />
            <g transform="translate(12, 12)">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" class="icon-blue" />
            </g>
        </g>
        <text x="80" y="42" class="title">① Guardian AST</text>
        <text x="80" y="62" class="subtitle">Static Analysis</text>
    </g>

    <!-- Box 2: WASI Sandbox -->
    <g transform="translate(345, 75)">
        <circle cx="105" cy="45" r="70" fill="url(#glowBlue)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowBlue)" />
            <g transform="translate(12, 12)">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" class="icon-blue" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" class="icon-blue" />
            </g>
        </g>
        <text x="80" y="42" class="title">② WASI Sandbox</text>
        <text x="80" y="62" class="subtitle">V8 Isolate Limits</text>
    </g>

    <!-- Box 3: Prototype Defense -->
    <g transform="translate(595, 75)">
        <circle cx="105" cy="45" r="70" fill="url(#glowBlue)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowBlue)" />
            <g transform="translate(12, 12)">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" class="icon-blue" />
                <path d="M12 8v4" class="icon-blue" />
                <path d="M12 16h.01" class="icon-blue" />
            </g>
        </g>
        <text x="80" y="42" class="title">③ Proto Defense</text>
        <text x="80" y="62" class="subtitle">Prototype Freeze</text>
    </g>

    <!-- ROW 2 (Right to Left) -->
    
    <!-- Box 4: PII Shield -->
    <g transform="translate(595, 235)">
        <circle cx="105" cy="45" r="70" fill="url(#glowPurple)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowPurple)" />
            <g transform="translate(12, 12)">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22" class="icon-purple" />
            </g>
        </g>
        <text x="80" y="42" class="title">④ PII Shield</text>
        <text x="80" y="62" class="subtitle">Egress Filtering</text>
    </g>

    <!-- Box 5: Aggregation Policy -->
    <g transform="translate(345, 235)">
        <circle cx="105" cy="45" r="70" fill="url(#glowPurple)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowPurple)" />
            <g transform="translate(12, 12)">
                <polygon points="12 2 2 7 12 12 22 7 12 2" class="icon-purple" />
                <polyline points="2 12 12 17 22 12" class="icon-purple" />
                <polyline points="2 17 12 22 22 17" class="icon-purple" />
            </g>
        </g>
        <text x="80" y="42" class="title">⑤ Aggregation</text>
        <text x="80" y="62" class="subtitle">Output Cardinality</text>
    </g>

    <!-- Box 6: ZK-Receipt -->
    <g transform="translate(95, 235)">
        <circle cx="105" cy="45" r="70" fill="url(#glowPurple)" />
        <rect x="0" y="0" width="210" height="90" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5" />
        <path d="M 12 1.5 L 198 1.5" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" />
        
        <g transform="translate(16, 21)">
            <rect width="48" height="48" rx="10" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1.5" />
            <circle cx="24" cy="24" r="20" fill="url(#glowPurple)" />
            <g transform="translate(12, 12)">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" class="icon-purple" />
                <path d="M14 2v6h6" class="icon-purple" />
                <path d="m9 15 2 2 4-4" class="icon-purple" />
            </g>
        </g>
        <text x="80" y="42" class="title">⑥ ZK-Receipt</text>
        <text x="80" y="62" class="subtitle">Crypto Integrity</text>
    </g>

    <!-- IO Labels placed last to render on top of card glows -->
    <text x="47" y="96" text-anchor="middle" class="io-label">FROM AI</text>
    <text x="47" y="110" text-anchor="middle" class="io-label">AGENT</text>

    <text x="47" y="256" text-anchor="middle" class="io-label">TO ORIGIN</text>
    <text x="47" y="270" text-anchor="middle" class="io-label">SERVER</text>
</svg>
