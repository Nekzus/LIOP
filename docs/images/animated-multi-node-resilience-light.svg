<svg viewBox="0 0 1100 740" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gl-b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="gl-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="gl-r" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <style>
    .t-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 18px; fill: #0f172a; }
    .t-sub   { font-family: system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 13px; fill: #475569; }
    .t-mono  { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; }
    .t-tag   { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
    .t-conn  { font-family: 'SF Mono', monospace; font-size: 10px; font-weight: 500; }
    .t-id    { font-family: 'SF Mono', monospace; font-size: 10px; fill: #94a3b8; }

    .cl  { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 6,6; animation: dash 20s linear infinite; }
    .cf  { stroke: #e2e8f0; stroke-width: 1.5; stroke-dasharray: 4,4; }
    .ca  { stroke: #0284c7; stroke-width: 2; stroke-dasharray: 6,6; animation: dashR 10s linear infinite; }
    @keyframes dash  { to { stroke-dashoffset: -400; } }
    @keyframes dashR { to { stroke-dashoffset: 400; } }

    /* MASTER: 28s (identical choreography to dark variant) */

    @keyframes b1 {
      0%   { opacity:0; transform:translate(0,0); }
      2%   { opacity:1; }
      12%  { opacity:1; transform:translate(220px,-170px); }
      14%  { opacity:0; transform:translate(220px,-170px); }
      100% { opacity:0; }
    }
    .b1-0 { animation: b1 28s linear infinite; opacity:0; }
    .b1-1 { animation: b1 28s linear infinite .3s; opacity:0; }
    .b1-2 { animation: b1 28s linear infinite .6s; opacity:0; }

    @keyframes b2 {
      0%,14% { opacity:0; transform:translate(0,0); }
      16%    { opacity:1; }
      23%    { opacity:1; transform:translate(-220px,170px); }
      25%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b2-0 { animation: b2 28s linear infinite; opacity:0; }
    .b2-1 { animation: b2 28s linear infinite .25s; opacity:0; }
    .b2-2 { animation: b2 28s linear infinite .5s; opacity:0; }

    @keyframes b3 {
      0%,25% { opacity:0; transform:translate(0,0); }
      27%    { opacity:1; }
      34%    { opacity:1; transform:translate(-170px,190px); }
      36%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b3-0 { animation: b3 28s linear infinite; opacity:0; }
    .b3-1 { animation: b3 28s linear infinite .3s; opacity:0; }
    .b3-2 { animation: b3 28s linear infinite .6s; opacity:0; }

    @keyframes vizV {
      0%,35% { opacity:0; } 36%,42% { opacity:1; } 43%,100% { opacity:0; }
    }
    .vizV { animation: vizV 28s linear infinite; }
    @keyframes pulseV {
      0%,34% { stroke:#8b5cf6; stroke-width:2; }
      36%,42% { stroke:#a78bfa; stroke-width:3.5; }
      44%,100% { stroke:#8b5cf6; stroke-width:2; }
    }
    .pulseV { animation: pulseV 28s infinite; }

    @keyframes b5 {
      0%,42% { opacity:0; transform:translate(0,0); }
      43%    { opacity:1; }
      49%    { opacity:1; transform:translate(170px,-190px); }
      50%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b5-0 { animation: b5 28s linear infinite; opacity:0; }
    .b5-1 { animation: b5 28s linear infinite .2s; opacity:0; }
    .b5-2 { animation: b5 28s linear infinite .4s; opacity:0; }

    @keyframes nxCrash {
      0%,49%   { stroke:#059669; fill:#ffffff; opacity:1; }
      50%      { stroke:#dc2626; fill:#ffffff; opacity:1; }
      51%      { stroke:#059669; fill:#ffffff; opacity:1; }
      52%      { stroke:#dc2626; fill:#ffffff; opacity:.8; }
      53%      { stroke:#059669; fill:#ffffff; opacity:1; }
      55%,100% { stroke:#dc2626; fill:#fef2f2; opacity:.25; stroke-dasharray:4,4; }
    }
    @keyframes nxTxt {
      0%,49% { opacity:1; }
      50% { opacity:.3; } 51% { opacity:1; } 52% { opacity:.3; } 53% { opacity:1; }
      55%,100% { opacity:.08; }
    }
    @keyframes nxWarn {
      0%,54% { opacity:0; }
      55%,100% { opacity:1; }
    }
    @keyframes clDie {
      0%,49% { stroke:#cbd5e1; opacity:1; }
      55%,100% { stroke:#fecaca; opacity:.15; }
    }
    .nx-box  { animation: nxCrash 28s infinite; }
    .nx-txt  { animation: nxTxt 28s infinite; }
    .nx-warn { animation: nxWarn 28s infinite; opacity:0; }
    .cl-die  { animation: clDie 28s infinite; }

    @keyframes p2pWake {
      0%,57% { stroke:#e2e8f0; stroke-width:1.5; }
      60%,95% { stroke:#0d9488; stroke-width:2.5; stroke-dasharray:8,4; }
      98%,100% { stroke:#e2e8f0; stroke-width:1.5; }
    }
    .p2p-wake { animation: p2pWake 28s infinite; }

    @keyframes b7a {
      0%,60% { opacity:0; transform:translate(0,0); }
      62%    { opacity:1; }
      70%    { opacity:1; transform:translate(120px,190px); }
      72%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b7a-0 { animation: b7a 28s linear infinite; opacity:0; }
    .b7a-1 { animation: b7a 28s linear infinite .3s; opacity:0; }
    .b7a-2 { animation: b7a 28s linear infinite .6s; opacity:0; }

    @keyframes vizB {
      0%,71% { opacity:0; } 72%,78% { opacity:1; } 79%,100% { opacity:0; }
    }
    .vizB { animation: vizB 28s linear infinite; }
    @keyframes pulseB {
      0%,70% { stroke:#059669; stroke-width:2; }
      72%,78% { stroke:#34d399; stroke-width:3.5; }
      80%,100% { stroke:#059669; stroke-width:2; }
    }
    .pulseB { animation: pulseB 28s infinite; }

    @keyframes b7ar {
      0%,78% { opacity:0; transform:translate(0,0); }
      79%    { opacity:1; }
      82%    { opacity:1; transform:translate(-120px,-190px); }
      83%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b7ar-0 { animation: b7ar 28s linear infinite; opacity:0; }
    .b7ar-1 { animation: b7ar 28s linear infinite .2s; opacity:0; }
    .b7ar-2 { animation: b7ar 28s linear infinite .4s; opacity:0; }

    @keyframes b7b {
      0%,72% { opacity:0; transform:translate(0,0); }
      74%    { opacity:1; }
      82%    { opacity:1; transform:translate(430px,190px); }
      84%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b7b-0 { animation: b7b 28s linear infinite; opacity:0; }
    .b7b-1 { animation: b7b 28s linear infinite .3s; opacity:0; }
    .b7b-2 { animation: b7b 28s linear infinite .6s; opacity:0; }

    @keyframes vizO {
      0%,83% { opacity:0; } 84%,90% { opacity:1; } 91%,100% { opacity:0; }
    }
    .vizO { animation: vizO 28s linear infinite; }
    @keyframes pulseO {
      0%,82% { stroke:#d97706; stroke-width:2; }
      84%,90% { stroke:#fbbf24; stroke-width:3.5; }
      92%,100% { stroke:#d97706; stroke-width:2; }
    }
    .pulseO { animation: pulseO 28s infinite; }

    @keyframes b7br {
      0%,90% { opacity:0; transform:translate(0,0); }
      91%    { opacity:1; }
      95%    { opacity:1; transform:translate(-430px,-190px); }
      96%    { opacity:0; }
      100%   { opacity:0; }
    }
    .b7br-0 { animation: b7br 28s linear infinite; opacity:0; }
    .b7br-1 { animation: b7br 28s linear infinite .2s; opacity:0; }
    .b7br-2 { animation: b7br 28s linear infinite .4s; opacity:0; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .sp0 { animation: spin 1.5s linear infinite; transform-origin:0 0; }
    .sp1 { animation: spin 1.5s linear infinite -.5s; transform-origin:0 0; }
    .sp2 { animation: spin 1.5s linear infinite -1s; transform-origin:0 0; }

    @keyframes pulseA {
      0%,41% { stroke:#0ea5e9; stroke-width:2; }
      43%,50% { stroke:#7dd3fc; stroke-width:3.5; }
      52%,77% { stroke:#0ea5e9; stroke-width:2; }
      79%,83% { stroke:#7dd3fc; stroke-width:3; }
      85%,90% { stroke:#0ea5e9; stroke-width:2; }
      92%,96% { stroke:#7dd3fc; stroke-width:3; }
      98%,100% { stroke:#0ea5e9; stroke-width:2; }
    }
    .pulseA { animation: pulseA 28s infinite; }

    @keyframes l1 { 0%,24% { opacity:1; } 25%,100% { opacity:0; } }
    @keyframes l2 { 0%,24% { opacity:0; } 25%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes l3 { 0%,49% { opacity:0; } 50%,59% { opacity:1; } 60%,100% { opacity:0; } }
    @keyframes l4 { 0%,59% { opacity:0; } 60%,100% { opacity:1; } }
    .l1 { animation: l1 28s infinite; }
    .l2 { animation: l2 28s infinite; opacity:0; }
    .l3 { animation: l3 28s infinite; opacity:0; }
    .l4 { animation: l4 28s infinite; opacity:0; }
  </style>

  <!-- ===== CONNECTIONS ===== -->

  <line x1="350" y1="210" x2="570" y2="70" class="cl cl-die" />
  <text x="425" y="118" class="t-conn" text-anchor="middle" fill="#0284c7" transform="rotate(-40 425 118)">findProviders()</text>

  <line x1="280" y1="295" x2="155" y2="450" class="ca" />
  <text x="182" y="372" class="t-conn" text-anchor="middle" fill="#0d9488" transform="rotate(-55 182 372)">Kyber768 · gRPC</text>

  <line x1="400" y1="295" x2="510" y2="450" class="ca" />
  <text x="476" y="378" class="t-conn" text-anchor="middle" fill="#0d9488" transform="rotate(55 476 378)">Kyber768 · gRPC</text>

  <line x1="430" y1="295" x2="850" y2="450" class="ca" />
  <text x="690" y="345" class="t-conn" text-anchor="middle" fill="#0d9488" transform="rotate(15 690 345)">Kyber768 · gRPC</text>

  <line x1="660" y1="90"  x2="155" y2="450" class="cf" />
  <line x1="680" y1="100" x2="510" y2="450" class="cf" />
  <line x1="700" y1="90"  x2="855" y2="450" class="cf" />
  <text x="750" y="215" class="t-sub" fill="#64748b" font-size="10">DHT Announce (Kademlia)</text>

  <line x1="260" y1="635" x2="490" y2="635" class="cf p2p-wake" />
  <line x1="570" y1="635" x2="810" y2="635" class="cf p2p-wake" />
  <text x="530" y="655" class="t-sub" fill="#94a3b8" font-size="9" text-anchor="middle">Cached Kademlia Routing Table Replicas · Peer-to-Peer</text>

  <!-- ===== NODES ===== -->

  <!-- ── @nekzus/nmp-agent (STDIO CLI) ── -->
  <rect x="200" y="155" width="280" height="170" rx="12" fill="#ffffff" class="pulseA" />
  <text x="340" y="186" class="t-title" text-anchor="middle">LIOP Agent</text>
  <text x="340" y="204" class="t-sub" text-anchor="middle">@nekzus/nmp-agent v1.1.2</text>
  <rect x="222" y="218" width="236" height="87" rx="6" fill="#f0f9ff" />
  <text x="340" y="238" class="t-tag" text-anchor="middle" fill="#0284c7">STDIO TRANSPORT</text>
  <line x1="242" y1="248" x2="438" y2="248" stroke="#e2e8f0" stroke-width="1" />
  <text x="340" y="264" class="t-mono" text-anchor="middle" fill="#0284c7">1. Receive JSON-RPC (tools/call)</text>
  <text x="340" y="280" class="t-mono" text-anchor="middle" fill="#0284c7">2. NmpMcpRouter.dispatch()</text>
  <text x="340" y="296" class="t-mono" text-anchor="middle" fill="#0284c7">3. transcodeMcpToNmp → gRPC</text>

  <!-- ── The Nexus (Bootstrap) ── -->
  <rect x="550" y="28" width="200" height="110" rx="12" class="nx-box" />
  <text x="650" y="58" class="t-title nx-txt" text-anchor="middle">🌌 The Nexus</text>
  <text x="650" y="76" class="t-sub nx-txt" text-anchor="middle">Bootstrap Node · Port 50050</text>
  <rect x="570" y="86" width="160" height="37" rx="6" fill="#ecfdf5" class="nx-txt" />
  <text x="650" y="103" class="t-mono nx-txt" text-anchor="middle" fill="#059669">Kademlia DHT Directory</text>
  <text x="650" y="118" class="t-id nx-txt" text-anchor="middle">capabilities: {} (no tools)</text>
  <circle cx="733" cy="48" r="5" fill="#059669" class="nx-txt" />
  <text x="650" y="62" class="t-title nx-warn" text-anchor="middle" fill="#dc2626" filter="url(#gl-r)">✕ NODE OFFLINE</text>
  <text x="650" y="82" class="t-sub nx-warn" text-anchor="middle" fill="#dc2626">Process Killed</text>
  <text x="650" y="107" class="t-mono nx-warn" text-anchor="middle" fill="#dc2626">Mesh intact via cached DHT</text>

  <!-- ── 🛡️ The Vault (Secure Data Server) ── -->
  <rect x="30" y="450" width="250" height="175" rx="12" fill="#ffffff" class="pulseV" />
  <text x="155" y="476" class="t-title" text-anchor="middle">🛡️ The Vault</text>
  <text x="155" y="494" class="t-sub" text-anchor="middle">Secure Data Server</text>
  <rect x="52" y="508" width="206" height="95" rx="6" fill="#fef2f2" stroke="#f43f5e" stroke-width="1" />
  <text x="155" y="526" class="t-tag" text-anchor="middle" fill="#be123c">WASI SANDBOX</text>
  <text x="155" y="544" class="t-mono" text-anchor="middle" fill="#be123c">ProcessMedicalRecord</text>
  <line x1="72" y1="554" x2="238" y2="554" stroke="#fecaca" stroke-width="1" />
  <text x="155" y="570" class="t-mono" text-anchor="middle" fill="#be123c">ASTGuardian.analyze()</text>
  <text x="155" y="590" class="t-mono" text-anchor="middle" fill="#059669">AES-256-GCM · LogicResponse</text>
  <text x="155" y="618" class="t-id" text-anchor="middle">12D3KooW...Vault · Port 50051</text>

  <!-- ── 🏦 The Bank (Secure Financial Server) ── -->
  <rect x="380" y="450" width="250" height="175" rx="12" fill="#ffffff" class="pulseB" />
  <text x="505" y="476" class="t-title" text-anchor="middle">🏦 The Bank</text>
  <text x="505" y="494" class="t-sub" text-anchor="middle">Secure Financial Server</text>
  <rect x="402" y="508" width="206" height="95" rx="6" fill="#f8fafc" />
  <text x="505" y="526" class="t-tag" text-anchor="middle" fill="#059669">WASI SANDBOX</text>
  <text x="505" y="544" class="t-mono" text-anchor="middle" fill="#0284c7">CheckBalance</text>
  <line x1="422" y1="554" x2="588" y2="554" stroke="#e2e8f0" stroke-width="1" />
  <text x="505" y="570" class="t-mono" text-anchor="middle" fill="#475569">ASTGuardian.analyze()</text>
  <text x="505" y="590" class="t-mono" text-anchor="middle" fill="#475569">AES-256-GCM · LogicResponse</text>
  <text x="505" y="618" class="t-id" text-anchor="middle">12D3KooW...Bank · Port 50052</text>

  <!-- ── 🔮 The Oracle (Real-time Data Provider) ── -->
  <rect x="730" y="450" width="250" height="175" rx="12" fill="#ffffff" class="pulseO" />
  <text x="855" y="476" class="t-title" text-anchor="middle">🔮 The Oracle</text>
  <text x="855" y="494" class="t-sub" text-anchor="middle">Real-time Data Provider</text>
  <rect x="752" y="508" width="206" height="95" rx="6" fill="#f8fafc" />
  <text x="855" y="526" class="t-tag" text-anchor="middle" fill="#d97706">WASI SANDBOX</text>
  <text x="855" y="544" class="t-mono" text-anchor="middle" fill="#0284c7">GetStockPrice</text>
  <line x1="772" y1="554" x2="938" y2="554" stroke="#e2e8f0" stroke-width="1" />
  <text x="855" y="570" class="t-mono" text-anchor="middle" fill="#475569">ASTGuardian.analyze()</text>
  <text x="855" y="590" class="t-mono" text-anchor="middle" fill="#475569">AES-256-GCM · LogicResponse</text>
  <text x="855" y="618" class="t-id" text-anchor="middle">12D3KooW...Oracle · Port 50053</text>

