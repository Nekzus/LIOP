<svg viewBox="0 0 1200 450" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="path-req-mcp" d="M 280 160 L 450 160" fill="none" />
    <path id="path-res-mcp" d="M 450 320 L 280 320" fill="none" />
    <path id="path-req-nmp" d="M 750 160 L 920 160" fill="none" />
    <path id="path-res-nmp" d="M 920 320 L 750 320" fill="none" />
  </defs>

  <style>
    .text-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 20px;
      fill: #e2e8f0;
    }
    .text-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
    }
    .text-code {
      font-family: monospace;
      font-size: 11px;
      fill: #38bdf8;
    }
    .text-tiny {
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      fill: #fbbf24;
    }
    .conn-line {
      stroke: #334155;
      stroke-width: 2;
      stroke-dasharray: 6, 6;
      animation: dash 20s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -400; }
    }

    @keyframes moveReqMcp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(170px); opacity: 0; }
    }
    .req-mcp-0 { animation: moveReqMcp 1.5s linear infinite; opacity: 0; }
    .req-mcp-1 { animation: moveReqMcp 1.5s linear infinite -0.5s; opacity: 0; }
    .req-mcp-2 { animation: moveReqMcp 1.5s linear infinite -1.0s; opacity: 0; }

    @keyframes moveReqNmp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(170px); opacity: 0; }
    }
    .req-nmp-0 { animation: moveReqNmp 1.5s linear infinite; opacity: 0; }
    .req-nmp-1 { animation: moveReqNmp 1.5s linear infinite -0.5s; opacity: 0; }
    .req-nmp-2 { animation: moveReqNmp 1.5s linear infinite -1.0s; opacity: 0; }

    @keyframes moveResNmp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-170px); opacity: 0; }
    }
    .res-nmp-0 { animation: moveResNmp 1.5s linear infinite; opacity: 0; }
    .res-nmp-1 { animation: moveResNmp 1.5s linear infinite -0.5s; opacity: 0; }
    .res-nmp-2 { animation: moveResNmp 1.5s linear infinite -1.0s; opacity: 0; }

    @keyframes moveResMcp {
      0% { transform: translateX(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-170px); opacity: 0; }
    }
    .res-mcp-0 { animation: moveResMcp 1.5s linear infinite; opacity: 0; }
    .res-mcp-1 { animation: moveResMcp 1.5s linear infinite -0.5s; opacity: 0; }
    .res-mcp-2 { animation: moveResMcp 1.5s linear infinite -1.0s; opacity: 0; }

    @keyframes rotateProc {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .proc-0 { animation: rotateProc 1.5s linear infinite; }
    .proc-1 { animation: rotateProc 1.5s linear infinite -0.5s; }
    .proc-2 { animation: rotateProc 1.5s linear infinite -1s; }
  </style>

  <rect width="100%" height="100%" fill="transparent" />

  <!-- Background Lines -->
  <line x1="280" y1="160" x2="450" y2="160" class="conn-line" />
  <line x1="450" y1="320" x2="280" y2="320" class="conn-line" />
  
  <line x1="750" y1="160" x2="920" y2="160" class="conn-line" />
  <line x1="920" y1="320" x2="750" y2="320" class="conn-line" />

  <!-- Network Labels -->
  <text x="365" y="130" class="text-sub" text-anchor="middle" fill="#facc15">STDIO: JSON-RPC</text>
  <text x="365" y="145" class="text-code" text-anchor="middle">tools/call</text>

  <text x="365" y="345" class="text-sub" text-anchor="middle" fill="#facc15">MCP Result</text>
  <text x="365" y="360" class="text-code" text-anchor="middle">text/plain</text>

  <text x="835" y="130" class="text-sub" text-anchor="middle" fill="#0ea5e9">gRPC: P2P Multiplex</text>
  <text x="835" y="145" class="text-code" text-anchor="middle">PQC Kyber-768 + AES-256</text>

  <text x="835" y="345" class="text-sub" text-anchor="middle" fill="#a78bfa">ZK-Receipt / Endorsement</text>
  <text x="835" y="360" class="text-code" text-anchor="middle">Borsh Serialized</text>

  <!-- Node 1: Claude -->
  <rect x="20" y="80" width="260" height="300" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="2" />
  <text x="150" y="120" class="text-title" text-anchor="middle">Claude Desktop</text>
  <text x="150" y="145" class="text-sub" text-anchor="middle">MCP Client / LLM</text>

  <rect x="40" y="180" width="220" height="180" rx="6" fill="#1e293b" />
  <text x="150" y="210" class="text-sub" text-anchor="middle">Prompt: "Consultar NMP-99"</text>
  <line x1="60" y1="225" x2="240" y2="225" stroke="#334155" stroke-width="1" />
  <text x="60" y="250" class="text-code">{"method": "tools/call",</text>
  <text x="60" y="270" class="text-code"> "params": {</text>
  <text x="60" y="290" class="text-code">  "name": "ProcessMedicalRecord"</text>
  <text x="60" y="310" class="text-code">  "arguments": {"patientId": "NMP-99"}</text>
  <text x="60" y="330" class="text-code"> }}</text>

  <!-- Node 2: NMP Agent -->
  <rect x="450" y="80" width="300" height="300" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" />
  <text x="600" y="120" class="text-title" text-anchor="middle">NMP Agent CLI</text>
  <text x="600" y="145" class="text-sub" text-anchor="middle">Zero-Config P2P Router</text>

  <rect x="470" y="180" width="260" height="180" rx="6" fill="#1e293b" />
  <text x="600" y="210" class="text-tiny" text-anchor="middle">TRANSCODING PIPELINE</text>
  <line x1="490" y1="225" x2="710" y2="225" stroke="#334155" stroke-width="1" />
  <text x="490" y="250" class="text-code" fill="#bae6fd">1. DHT Routing (FindPeer)</text>
  <text x="490" y="275" class="text-code" fill="#bae6fd">2. Key Encap (Kyber-768)</text>
  <text x="490" y="300" class="text-code" fill="#bae6fd">3. Pack WASM Module Binary</text>
  <text x="490" y="325" class="text-code" fill="#bae6fd">4. Transact via Yamux Stream</text>

  <!-- Node 3: The Vault -->
  <rect x="920" y="80" width="260" height="300" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" />
  <text x="1050" y="120" class="text-title" text-anchor="middle">The Vault</text>
  <text x="1050" y="145" class="text-sub" text-anchor="middle">Zero-Trust Data Target</text>

  <rect x="940" y="180" width="220" height="180" rx="6" fill="#450a0a" stroke="#f43f5e" stroke-width="1" />
  <text x="1050" y="210" class="text-tiny" text-anchor="middle" fill="#fca5a5">WASI EXECUTION SANDBOX</text>
  <line x1="960" y1="225" x2="1140" y2="225" stroke="#7f1d1d" stroke-width="1" />
  <text x="960" y="250" class="text-code" fill="#fecdd3">A. Guardian AST Scan</text>
  <text x="960" y="275" class="text-code" fill="#fecdd3">B. Javy Runtime Boot</text>
  <text x="960" y="300" class="text-code" fill="#fecdd3">C. Logic-on-Origin Exec</text>
  <text x="960" y="325" class="text-code" fill="#fecdd3">D. Seal Result (AES-256-GCM)</text>

  <!-- Particles -->
  <circle cx="280" cy="160" r="6" fill="#facc15" class="req-mcp-0" />
  <circle cx="280" cy="160" r="6" fill="#facc15" class="req-mcp-1" />
  <circle cx="280" cy="160" r="6" fill="#facc15" class="req-mcp-2" />

  <circle cx="750" cy="160" r="6" fill="#0ea5e9" class="req-nmp-0" />
  <circle cx="750" cy="160" r="6" fill="#0ea5e9" class="req-nmp-1" />
  <circle cx="750" cy="160" r="6" fill="#0ea5e9" class="req-nmp-2" />

  <circle cx="920" cy="320" r="6" fill="#a78bfa" class="res-nmp-0" />
  <circle cx="920" cy="320" r="6" fill="#a78bfa" class="res-nmp-1" />
  <circle cx="920" cy="320" r="6" fill="#a78bfa" class="res-nmp-2" />

  <circle cx="450" cy="320" r="6" fill="#facc15" class="res-mcp-0" />
  <circle cx="450" cy="320" r="6" fill="#facc15" class="res-mcp-1" />
  <circle cx="450" cy="320" r="6" fill="#facc15" class="res-mcp-2" />

  <!-- Abstract Processing Graphic -->
  <g transform="translate(1050, 270)">
    <circle cx="50" cy="0" r="4" fill="#fbbf24" class="proc-0" />
    <circle cx="50" cy="0" r="4" fill="#fbbf24" class="proc-1" />
    <circle cx="50" cy="0" r="4" fill="#fbbf24" class="proc-2" />
  </g>
</svg>
