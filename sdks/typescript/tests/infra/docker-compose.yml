networks:
  liop-testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

volumes:
  nexus-identity:
  vault-identity:
  bank-identity:
  oracle-identity:

x-node-base: &node-base
  build:
    context: ../../../../
    dockerfile: sdks/typescript/tests/infra/Dockerfile
  networks:
    liop-testnet: {}
  restart: always
  init: true

services:
  nexus:
    <<: *node-base
    container_name: liop-nexus
    hostname: nexus
    command: ["tsx", "--no-warnings", "tests/infra/entrypoints/nexus.ts"]
    environment:
      LIOP_NODE_ROLE: nexus
      LIOP_LOG_LEVEL: info
      # Short tool descriptions in MCP tools/list (aligned with examples/industrial-demo UX).
      LIOP_MCP_COMPACT_TOOL_DESCRIPTIONS: "1"
      # Host/Inspector: route tools/call to published gRPC ports (13011/13021/13031), not 50051.
      LIOP_USE_PUBLISHED_GRPC_PORTS: "0"
    volumes:
      - ./nexus-data:/app/data
    networks:
      liop-testnet:
        ipv4_address: 172.20.0.10
    ports:
      - "13001:4000"    # libp2p TCP (P2P Mesh Port)
      - "13000:3000"    # HTTP health / MCP Bootstrap
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  vault:
    <<: *node-base
    container_name: liop-vault
    hostname: vault
    command: ["tsx", "--no-warnings", "tests/infra/entrypoints/vault.ts"]
    environment:
      LIOP_NODE_ROLE: vault
      LIOP_LOG_LEVEL: info
      LIOP_MCP_COMPACT_TOOL_DESCRIPTIONS: "1"
    volumes:
      - ./nexus-data:/app/data
    networks:
      liop-testnet:
        ipv4_address: 172.20.0.11
    ports:
      - "13003:4000"    # libp2p TCP (Vault P2P)
      - "13011:50051"   # gRPC Vault
      - "13013:3000"    # Health Vault
    depends_on:
      nexus:
        condition: service_healthy

  bank:
    <<: *node-base
    container_name: liop-bank
    hostname: bank
    command: ["tsx", "--no-warnings", "tests/infra/entrypoints/bank.ts"]
    environment:
      LIOP_NODE_ROLE: bank
      LIOP_LOG_LEVEL: info
      LIOP_MCP_COMPACT_TOOL_DESCRIPTIONS: "1"
    volumes:
      - ./nexus-data:/app/data
    networks:
      liop-testnet:
        ipv4_address: 172.20.0.12
    ports:
      - "13004:4000"    # libp2p TCP (Bank P2P)
      - "13021:50051"   # gRPC Bank
      - "13014:3000"    # Health Bank
    depends_on:
      nexus:
        condition: service_healthy

  oracle:
    <<: *node-base
    container_name: liop-oracle
    hostname: oracle
    command: ["tsx", "--no-warnings", "tests/infra/entrypoints/oracle.ts"]
    environment:
      LIOP_NODE_ROLE: oracle
      LIOP_LOG_LEVEL: info
      LIOP_MCP_COMPACT_TOOL_DESCRIPTIONS: "1"
    volumes:
      - ./nexus-data:/app/data
    networks:
      liop-testnet:
        ipv4_address: 172.20.0.13
    ports:
      - "13005:4000"    # libp2p TCP (Oracle P2P)
      - "13031:50051"   # gRPC Oracle
      - "13015:3000"    # Health Oracle
    depends_on:
      nexus:
        condition: service_healthy

  test-runner:
    <<: *node-base
    container_name: liop-test-runner
    hostname: runner
    command: ["vitest", "run", "--config", "tests/infra/vitest.crossnet.config.ts"]
    environment:
      NEXUS_URL: http://nexus:3000
      VAULT_URL: http://vault:3000
      BANK_URL: http://bank:3000
      ORACLE_URL: http://oracle:3000
    networks:
      liop-testnet:
        ipv4_address: 172.20.0.100
    depends_on:
      nexus:
        condition: service_started
      vault:
        condition: service_started
      bank:
        condition: service_started
      oracle:
        condition: service_started

  # Official MCP Inspector (browser UI + proxy). Optional; does not start by default.
  # Start: docker compose --profile inspector up -d mcp-inspector
  # UI: http://127.0.0.1:16274 — in the sidebar use streamable-http → http://nexus:3000/mcp
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: liop-mcp-inspector
    profiles:
      - inspector
    ports:
      - "127.0.0.1:16274:6274"
      - "127.0.0.1:16277:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_AUTO_OPEN_ENABLED: "false"
      # Browser Origin uses the host-mapped port (16274), not 6274 inside the container.
      ALLOWED_ORIGINS: "http://localhost:16274,http://127.0.0.1:16274"
    networks:
      liop-testnet: {}
    depends_on:
      nexus:
        condition: service_started
