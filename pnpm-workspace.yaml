packages:
  - "sdks/typescript"
  - "sdks/typescript/examples/**"
  - "examples/**"

verifyDeps: false

allowBuilds:
  esbuild: true
  protobufjs: true

auditConfig:
  ignoreGhsas:
    - GHSA-2w6w-674q-4c4q
    - GHSA-xq3m-2v4x-88gg
    - GHSA-3mfm-83xf-c92r
    - GHSA-737v-mqg7-c878
    - GHSA-v2wj-q39q-566r
    - GHSA-p9ff-h696-f583
    - GHSA-c2c7-rcm5-vvqj
    - GHSA-j3q9-mxjg-w52f
    - GHSA-xhpv-hc6g-r9c6
    - GHSA-9cx6-37pm-9jff
    - GHSA-r5fr-rjxr-66jc
    - GHSA-xjpj-3mr7-gcpf
    - GHSA-q3j6-qgpj-74h6
    - GHSA-v39h-62p7-jpjc
    - GHSA-ph9p-34f9-6g65

minimumReleaseAgeExclude:
  - '@libp2p/kad-dht@16.3.0'

overrides:
  multiformats: "14.0.0"
  "@multiformats/multiaddr": "13.0.3"
  protobufjs: "7.5.8"
  content-type: "1.0.5"
  type-is: "2.0.1"
  "@libp2p/interface": "3.2.3"
  "@libp2p/peer-collections": "7.0.21"
  vitest: "4.1.8"
  "@vitest/coverage-v8": "4.1.8"
  aggregate-error: "npm:@socketregistry/aggregate-error@^1"
  deep-equal: "npm:@socketregistry/deep-equal@^1"
  es-define-property: "npm:@socketregistry/es-define-property@^1"
  function-bind: "npm:@socketregistry/function-bind@^1"
  gopd: "npm:@socketregistry/gopd@^1"
  has-symbols: "npm:@socketregistry/has-symbols@^1"
  hasown: "npm:@socketregistry/hasown@^1"
  indent-string: "npm:@socketregistry/indent-string@^1"
  is-interactive: "npm:@socketregistry/is-interactive@^1"
  is-unicode-supported: "npm:@socketregistry/is-unicode-supported@^1"
  isarray: "npm:@socketregistry/isarray@^1"
  object-assign: "npm:@socketregistry/object-assign@^1"
  safe-buffer: "npm:@socketregistry/safe-buffer@^1"
  safer-buffer: "npm:@socketregistry/safer-buffer@^1"
  side-channel: "npm:@socketregistry/side-channel@^1"

packageConfigs:
  - match:
      - "liop"
      - "@nekzus/liop"
      - "@liop/example-server-quickstart"
      - "@liop/example-server"
      - "@liop/example-client-quickstart"
      - "@neural-mesh/industrial-sentinel-mesh"
      - "@neural-mesh/demos"
      - "@neural-mesh/high-fidelity-demo"
    saveExact: true

